<div class="dm-dashboard">
    <!-- Header with DM tools navigation -->
    <div class="dm-header">
        <div class="dm-title-container">
            <h1 class="dm-title">{{ 'dm-dashboard' | transloco }}</h1>
        </div>

        <div class="dm-tabs">
            <button class="dm-tab" 
                    [class.active]="currentTab() === 'enemies'" 
                    (click)="switchTab('enemies')">
                {{ 'enemies' | transloco }}
            </button>
            <button class="dm-tab" 
                    [class.active]="currentTab() === 'users'" 
                    (click)="switchTab('users')">
                {{ 'users' | transloco }}
            </button>
            <button class="dm-tab" 
                    [class.active]="currentTab() === 'habilities'" 
                    (click)="switchTab('habilities')">
                {{ 'habilities' | transloco }}
            </button>
        </div>
    </div>

    <div class="dm-content">
        <!-- Enemies Tab -->
        @if (currentTab() === 'enemies') {
            <app-enemies-tab (battleStarted)="onBattleStarted($event)"></app-enemies-tab>
        }

        <!-- Users Tab -->
        @if (currentTab() === 'users') {
            <app-users-tab></app-users-tab>
        }

        <!-- Habilities Tab -->
        @if (currentTab() === 'habilities') {
            <app-habilities-tab></app-habilities-tab>
        }
    </div>

    <div class="dm-footer">
        <app-locale-changer></app-locale-changer>
        <button class="enemy-action-button danger" (click)="signOut()">
            {{ 'sign-out' | transloco }}
        </button>
    </div>
</div>
