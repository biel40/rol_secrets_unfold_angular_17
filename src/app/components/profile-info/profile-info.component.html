<div class="profile-card">
    <!-- Header con badge y nombre -->
    <div class="card-header">
        <div class="level-badge">
            <span class="level-number">{{ profile?.level }}</span>
            <span class="level-label">LVL</span>
        </div>
        <h2 class="character-name">{{ profile?.username }}</h2>
    </div>

    <!-- Imagen del personaje -->
    <div class="character-image-container">
        <div class="image-frame">
            <img class="character-image" [src]="profile?.image_url" alt="Character" loading="lazy">
            <div class="image-overlay"></div>
        </div>
        <div class="image-glow"></div>
    </div>

    <!-- Información del personaje -->
    <div class="character-stats">
        <div class="stat-item">
            <div class="stat-label">
                <span class="stat-icon">⚡</span>
                <span>Poder</span>
            </div>
            <div class="stat-value">
                <span>{{ profile?.power }}</span>
                <span class="stat-emoji">{{ elementEmoji }}</span>
            </div>
        </div>

        <div class="stat-item">
            <div class="stat-label">
                <span class="stat-icon">🎭</span>
                <span>Clase</span>
            </div>
            <div class="stat-value">
                <span>{{ profile?.clase }}</span>
                <span class="stat-emoji">{{ classEmoji }}</span>
            </div>
        </div>

        <div class="stat-item">
            <div class="stat-label">
                <span class="stat-icon">⚔️</span>
                <span>Arma</span>
            </div>
            <div class="stat-value">
                <span>{{ profile?.weapon }}</span>
                <span class="stat-emoji">{{ weaponEmoji }}</span>
            </div>
        </div>
    </div>
</div>
